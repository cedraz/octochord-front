kind: pipeline
type: docker
name: deploy-octocord-front

steps:
  - name: build-and-push
    image: plugins/docker
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      repo: icarocedraz/octocord-front
      tags: latest
      cache_from: icarocedraz/octocord-front:latest
      cache_to: icarocedraz/octocord-front:latest,mode=max
      build_args:
        - VITE_API_URL=https://octocord-api.cedraz.dev
    when:
      branch:
        - main
      event:
        - push

  - name: deploy
    image: docker:23
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
      - name: project-files
        path: /app
    commands:
      - apk add --no-cache docker-cli-compose
      - cd /app
      - docker compose -p octocord pull frontend-octocord
      - docker compose -p octocord up -d --force-recreate --no-deps frontend-octocord
    when:
      branch:
        - main
      event:
        - push

  - name: notificar-falha-discord
    image: appleboy/drone-discord
    settings:
      webhook_url:
        from_secret: discord_webhook
      message: '🚨 Falha no pipeline do repositório **${DRONE_REPO}** na branch **${DRONE_BRANCH}**.'
    when:
      status:
        - failure

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
  - name: project-files
    host:
      path: /home/cedraz-ubuntu-2/Documentos/deploys/octocord

trigger:
  branch:
    - main
  event:
    - push
